[build]
  command = "node scripts/generate-extension-pages.mjs && npm run generate:apps && npm run generate:plugins && npm run generate:mcp && npm run generate:llm && npm run docs:build"
  publish = "docs/.vitepress/dist"

[build.environment]
  NODE_VERSION = "20"

# SPA fallback for clean URLs
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

# Cache static assets aggressively
[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/SaaS/*"
  [headers.values]
    Cache-Control = "public, max-age=86400"

[[headers]]
  for = "/llms*.txt"
  [headers.values]
    Access-Control-Allow-Origin = "*"
    Cache-Control = "public, max-age=3600"
