<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 420" fill="none">
  <style>
    text { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; }
    .title { font-size: 13px; font-weight: 700; fill: #7f7f96; letter-spacing: 0.5px; text-transform: uppercase; }
    .box-label { font-size: 14px; font-weight: 600; fill: #e8e6f0; }
    .box-sub { font-size: 12px; fill: #8b8b9e; }
    .item { font-size: 12px; fill: #b0adc0; font-family: 'SF Mono', 'Fira Code', monospace; }
    .badge { font-size: 10px; font-weight: 600; letter-spacing: 0.3px; }
    .connector { stroke: #3d3856; stroke-width: 2; }
    .arrow { fill: #3d3856; }
  </style>

  <!-- .env file container -->
  <rect x="40" y="30" width="560" height="250" rx="16" fill="#1a1726" stroke="#2d2844" stroke-width="1.5"/>
  <text x="320" y="58" text-anchor="middle" class="title">.env file</text>

  <!-- .env-only settings — solid border = active -->
  <rect x="72" y="78" width="230" height="180" rx="12" fill="#211e30" stroke="#7c3aed" stroke-width="1.5"/>
  <rect x="88" y="90" width="108" height="22" rx="11" fill="#2e1a5e"/>
  <text x="142" y="105" text-anchor="middle" class="badge" fill="#c4b5fd">ALWAYS ACTIVE</text>
  <text x="88" y="136" class="box-label">.env-only settings</text>
  <text x="88" y="162" class="item">HOST, PORT</text>
  <text x="88" y="180" class="item">DATABASE_URL</text>
  <text x="88" y="198" class="item">DEBUG</text>
  <text x="88" y="216" class="item">SUPER_USER</text>
  <text x="88" y="234" class="item">AUTH_SECRET_KEY</text>

  <!-- Admin UI settings — dashed border = overridden -->
  <rect x="338" y="78" width="230" height="180" rx="12" fill="#211e30" stroke="#4c3a7a" stroke-width="1.5" stroke-dasharray="6 3"/>
  <rect x="354" y="90" width="140" height="22" rx="11" fill="#261e3a"/>
  <text x="424" y="105" text-anchor="middle" class="badge" fill="#7f7f96">IGNORED WHEN UI ON</text>
  <text x="354" y="136" class="box-label">Admin UI settings</text>
  <text x="354" y="162" class="item">LNBITS_SITE_TITLE</text>
  <text x="354" y="180" class="item">LNBITS_BACKEND_WALLET</text>
  <text x="354" y="198" class="item">Fees, Rate Limits</text>
  <text x="354" y="216" class="item">Auth methods, Themes</text>
  <text x="354" y="234" class="item">Extension config</text>

  <!-- Arrow -->
  <line x1="453" y1="280" x2="453" y2="340" class="connector"/>
  <text x="470" y="314" class="box-sub">overridden by</text>
  <polygon points="447,338 459,338 453,348" class="arrow"/>

  <!-- Admin UI / DB -->
  <rect x="313" y="348" width="280" height="56" rx="12" fill="#7c3aed"/>
  <text x="453" y="374" text-anchor="middle" font-size="14" font-weight="600" fill="white">Admin UI / Database</text>
  <text x="453" y="392" text-anchor="middle" font-size="12" fill="rgba(255,255,255,0.75)">Runtime configuration</text>

  <!-- Watermark -->
  <g transform="translate(546, 388) scale(0.028)" opacity="0.1">
    <path d="M158.566 493.857L1 901L450.49 355.202H264.831L501.791 1H187.881L36.4218 493.857H158.566Z" fill="#a78bfa"/>
    <path d="M616.041 764.863V134.611H741.647V645.115H1023.41V764.863H616.041Z" fill="#e8e6f0"/>
    <path d="M1079.99 764.863V134.611H1198.81L1478.31 543.014V134.611H1600.52V764.863H1478.31L1198.81 360.241V764.863H1079.99Z" fill="#e8e6f0"/>
    <path d="M1693.87 768.522V148.458H1764.1V377.349H1770.05C1775.21 369.275 1782.35 358.981 1791.47 346.467C1800.8 333.751 1814.09 322.448 1831.35 312.557C1848.81 302.465 1872.41 297.419 1902.17 297.419C1940.66 297.419 1974.58 307.208 2003.94 326.787C2033.3 346.366 2056.22 374.119 2072.68 410.048C2089.15 445.976 2097.38 488.363 2097.38 537.209C2097.38 586.459 2089.15 629.149 2072.68 665.279C2056.22 701.207 2033.4 729.061 2004.24 748.842C1975.08 768.421 1941.45 778.21 1903.36 778.21Z" fill="#e8e6f0"/>
    <path d="M2204.81 768.522V303.474H2275.04V768.522H2204.81Z" fill="#e8e6f0"/>
    <path d="M2602.45 303.474V364.027H2365.57V303.474H2602.45ZM2434.61 192.057H2504.84V635.305C2504.84 655.489 2507.72 670.628 2513.47 680.72C2519.42 690.61 2526.96 697.271 2536.09 700.702C2545.41 703.932 2555.23 705.546 2565.55 705.546Z" fill="#e8e6f0"/>
    <path d="M3023.67 407.625L2960.58 425.791C2956.61 415.094 2950.76 404.699 2943.02 394.607C2935.49 384.313 2925.17 375.835 2912.08 369.174C2898.98 362.513 2882.22 359.183 2861.79 359.183Z" fill="#e8e6f0"/>
  </g>
</svg>
