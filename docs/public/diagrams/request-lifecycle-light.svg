<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 680" fill="none">
  <style>
    text { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; }
    .step-label { font-size: 14px; font-weight: 600; fill: white; }
    .step-sub { font-size: 11px; fill: rgba(255,255,255,0.75); }
    .neutral-label { font-size: 14px; font-weight: 600; fill: #2d2b3d; }
    .neutral-sub { font-size: 11px; fill: #8b8b9e; }
    .connector { stroke: #d4d0e4; stroke-width: 2; }
    .arrow { fill: #d4d0e4; }
  </style>

  <!-- Client Request -->
  <rect x="100" y="20" width="200" height="44" rx="22" fill="#f8f6fc" stroke="#e8e3f3" stroke-width="1.5"/>
  <text x="200" y="47" text-anchor="middle" class="neutral-label">Client Request</text>

  <line x1="200" y1="64" x2="200" y2="94" class="connector"/>
  <polygon points="194,92 206,92 200,102" class="arrow"/>

  <!-- Middleware -->
  <rect x="60" y="102" width="280" height="90" rx="12" fill="#7c3aed"/>
  <text x="200" y="130" text-anchor="middle" class="step-label">Middleware Stack</text>
  <text x="200" y="148" text-anchor="middle" class="step-sub">CORS · GZip · Session · IP Block</text>
  <text x="200" y="164" text-anchor="middle" class="step-sub">Rate Limit · Audit · Extension Routing</text>

  <line x1="200" y1="192" x2="200" y2="222" class="connector"/>
  <polygon points="194,220 206,220 200,230" class="arrow"/>

  <!-- Route Dispatch -->
  <rect x="60" y="230" width="280" height="56" rx="12" fill="#8b5cf6"/>
  <text x="200" y="254" text-anchor="middle" class="step-label">Route Dispatch</text>
  <text x="200" y="270" text-anchor="middle" class="step-sub">Core or Extension endpoint</text>

  <line x1="200" y1="286" x2="200" y2="316" class="connector"/>
  <polygon points="194,314 206,314 200,324" class="arrow"/>

  <!-- Auth Decorators -->
  <rect x="60" y="324" width="280" height="72" rx="12" fill="#a78bfa"/>
  <text x="200" y="352" text-anchor="middle" class="step-label">Auth Decorators</text>
  <text x="200" y="370" text-anchor="middle" class="step-sub">@require_admin_key · @require_invoice_key</text>
  <text x="200" y="384" text-anchor="middle" class="step-sub">@check_user_exists</text>

  <line x1="200" y1="396" x2="200" y2="426" class="connector"/>
  <polygon points="194,424 206,424 200,434" class="arrow"/>

  <!-- Service Layer -->
  <rect x="60" y="434" width="280" height="56" rx="12" fill="white" stroke="#d4d0e4" stroke-width="1.5"/>
  <text x="200" y="458" text-anchor="middle" class="neutral-label">Service Layer</text>
  <text x="200" y="474" text-anchor="middle" class="neutral-sub">Business logic</text>

  <line x1="200" y1="490" x2="200" y2="520" class="connector"/>
  <polygon points="194,518 206,518 200,528" class="arrow"/>

  <!-- CRUD Layer -->
  <rect x="60" y="528" width="280" height="56" rx="12" fill="white" stroke="#d4d0e4" stroke-width="1.5"/>
  <text x="200" y="552" text-anchor="middle" class="neutral-label">CRUD Layer</text>
  <text x="200" y="568" text-anchor="middle" class="neutral-sub">Database operations</text>

  <line x1="200" y1="584" x2="200" y2="614" class="connector"/>
  <polygon points="194,612 206,612 200,622" class="arrow"/>

  <!-- Database -->
  <rect x="100" y="622" width="200" height="44" rx="12" fill="#f3f0fa" stroke="#c4b5fd" stroke-width="1.5"/>
  <text x="200" y="649" text-anchor="middle" class="neutral-label">SQLite / PostgreSQL</text>

  <!-- Watermark -->
