<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 420" fill="none">
  <style>
    text { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; }
    .title { font-size: 13px; font-weight: 700; fill: #8b8b9e; letter-spacing: 0.5px; text-transform: uppercase; }
    .box-label { font-size: 14px; font-weight: 600; fill: #2d2b3d; }
    .box-sub { font-size: 11.5px; fill: #8b8b9e; }
    .connector { stroke: #d4d0e4; stroke-width: 2; }
    .arrow { fill: #d4d0e4; }
  </style>

  <!-- Step 1: Super User -->
  <rect x="150" y="20" width="300" height="56" rx="12" fill="#7c3aed"/>
  <text x="300" y="44" text-anchor="middle" font-size="12" font-weight="700" fill="white" letter-spacing="0.5" text-transform="uppercase" opacity="0.7">Step 1</text>
  <text x="300" y="62" text-anchor="middle" font-size="14" font-weight="600" fill="white">Super User configures providers</text>

  <!-- Arrow 1→2 -->
  <line x1="300" y1="76" x2="300" y2="108" class="connector"/>
  <polygon points="294,106 306,106 300,116" class="arrow"/>

  <!-- Step 2: Provider Settings -->
  <rect x="100" y="116" width="400" height="72" rx="12" fill="#f8f6fc" stroke="#e8e3f3" stroke-width="1.5"/>
  <text x="300" y="140" text-anchor="middle" font-size="12" font-weight="700" fill="#8b8b9e" letter-spacing="0.5">STEP 2</text>
  <text x="300" y="158" text-anchor="middle" class="box-label">Server-level fiat provider settings</text>
  <text x="300" y="176" text-anchor="middle" class="box-sub">API keys, webhook secrets, limits, allowed users</text>

  <!-- Arrow 2→3 -->
  <line x1="300" y1="188" x2="300" y2="220" class="connector"/>
  <polygon points="294,218 306,218 300,228" class="arrow"/>

  <!-- Step 3: Core Service -->
  <rect x="100" y="228" width="400" height="72" rx="12" fill="#f8f6fc" stroke="#e8e3f3" stroke-width="1.5"/>
  <text x="300" y="252" text-anchor="middle" font-size="12" font-weight="700" fill="#8b8b9e" letter-spacing="0.5">STEP 3</text>
  <text x="300" y="270" text-anchor="middle" class="box-label">Core fiat provider service</text>
  <text x="300" y="288" text-anchor="middle" class="box-sub">Handles checkout sessions, webhooks, and signature verification</text>

  <!-- Arrow 3→4 -->
  <line x1="300" y1="300" x2="300" y2="332" class="connector"/>
  <polygon points="294,330 306,330 300,340" class="arrow"/>

  <!-- Step 4: Extensions -->
  <rect x="32" y="340" width="240" height="64" rx="12" fill="white" stroke="#d4d0e4" stroke-width="1.5"/>
  <text x="152" y="366" text-anchor="middle" class="box-label">Extensions</text>
  <text x="152" y="384" text-anchor="middle" class="box-sub">Check availability, offer fiat to users</text>

  <rect x="328" y="340" width="240" height="64" rx="12" fill="white" stroke="#d4d0e4" stroke-width="1.5"/>
  <text x="448" y="366" text-anchor="middle" class="box-label">Users</text>
  <text x="448" y="384" text-anchor="middle" class="box-sub">Choose Lightning, Card, or PayPal</text>

  <!-- Horizontal connector between Extensions and Users -->
  <line x1="272" y1="372" x2="328" y2="372" class="connector"/>
  <polygon points="326,366 326,378 336,372" class="arrow"/>

  <!-- Provider badges on right side -->
  <rect x="520" y="133" width="68" height="24" rx="6" fill="#635bff"/>
  <text x="554" y="149" text-anchor="middle" font-size="11" font-weight="600" fill="white">Stripe</text>

  <rect x="520" y="163" width="68" height="24" rx="6" fill="#0070ba"/>
  <text x="554" y="179" text-anchor="middle" font-size="11" font-weight="600" fill="white">PayPal</text>
</svg>
